name: Gerar APK Android

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  construir:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar codigo
        uses: actions/checkout@v4

      - name: Instalar dependencias do sistema
        run: |
          sudo apt update
          sudo apt install -y python3 python3-pip python3-setuptools python3-wheel git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo6 cmake libffi-dev libssl-dev

      - name: Descompactar ZIP do sistema
        run: |
          mkdir -p projeto_apk
          ZIP_ARQUIVO=$(ls *.zip 2>/dev/null | head -n 1)

          if [ -z "$ZIP_ARQUIVO" ]; then
            echo "ERRO: nenhum arquivo ZIP encontrado na raiz do repositorio."
            exit 1
          fi

          echo "ZIP encontrado: $ZIP_ARQUIVO"
          unzip -o "$ZIP_ARQUIVO" -d projeto_apk

      - name: Localizar buildozer
        run: |
          BUILD_DIR=$(find projeto_apk -name buildozer.spec -exec dirname {} \; | head -n 1)

          if [ -z "$BUILD_DIR" ]; then
            echo "ERRO: buildozer.spec nao encontrado dentro do ZIP."
            find projeto_apk -maxdepth 6 -type f
            exit 1
          fi

          echo "BUILD_DIR=$BUILD_DIR" >> "$GITHUB_ENV"
          echo "buildozer.spec encontrado em: $BUILD_DIR"

      - name: Corrigir buildozer automaticamente
        run: |
          cd "$BUILD_DIR"

          if ! grep -q "^title =" buildozer.spec; then
            sed -i '/^\[app\]/a title = Sistema Express' buildozer.spec
          fi

          if ! grep -q "^package.name =" buildozer.spec; then
            echo "package.name = sistemaexpress" >> buildozer.spec
          fi

          if ! grep -q "^package.domain =" buildozer.spec; then
            echo "package.domain = org.expresscolorado" >> buildozer.spec
          fi

          echo "buildozer.spec conferido:"
          head -80 buildozer.spec

      - name: Instalar Buildozer
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install buildozer cython

      - name: Gerar APK
        run: |
          cd "$BUILD_DIR"
          buildozer android debug

      - name: Enviar APK como artefato
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: SISTEMA-EXPRESS-APK
          path: |
            ${{ env.BUILD_DIR }}/bin/*.apk
